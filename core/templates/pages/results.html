{{template "base.html" .}}

{{define "title"}}Results - LevelMix{{end}}

{{define "results_content"}}
<div class="flex items-center justify-center min-h-screen px-6">
    <div class="mx-auto" style="max-width: 1200px;">
        <div class="bg-surface-container-high rounded-xl p-8">
            <!-- Completion Header -->
            <div class="flex items-center gap-6 mb-6">
                <div class="w-16 h-16 bg-success/20 rounded-full flex items-center justify-center flex-shrink-0">
                    <span class="material-symbols-outlined text-success" style="font-size: 32px;">check_circle</span>
                </div>
                <div class="flex-1">
                    <h2 class="text-2xl font-bold text-text-primary mb-2">Processing Complete!</h2>
                    <p class="text-text-secondary">
                        Your audio has been leveled and is ready to go.
                    </p>
                </div>
            </div>

            <!-- Download Section -->
            <div class="pt-6 mt-2 space-y-3">
                <a href="/download/{{.fileID}}"
                    class="btn-sand block w-full text-center"
                    style="text-decoration: none; padding: 0.875rem 1.5rem;"
                    download>
                    Download Processed Audio
                </a>

                <a href="/upload"
                    class="btn-ghost block w-full text-center"
                    style="text-decoration: none; padding: 0.875rem 1.5rem;">
                    Process Another File
                </a>
            </div>
        </div>
    </div>
</div>
{{end}}
