{{template "base.html" .}}

{{define "verify_email_rejected_content"}}
<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 text-center">
        <div>
            <h2 class="mt-6 text-3xl font-bold text-text-primary">Account removed</h2>
            <p class="mt-3 text-sm text-text-tertiary">
                Thanks for letting us know. The account created with this email has been
                permanently deleted. No further emails will be sent.
            </p>
        </div>
        <div>
            <a href="/" class="btn-sand inline-block" style="padding: 0.875rem 1.5rem; font-size: 0.875rem;">
                Return home
            </a>
        </div>
    </div>
</div>
{{end}}
